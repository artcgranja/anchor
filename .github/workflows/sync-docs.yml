name: Sync Docs to astro-docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to astro-docs
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_SYNC_TOKEN }}
          repository: artcgranja/astro-docs
          event-type: sync-anchor-docs
